<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>TTB Label Verifier UI Home</title>
    <style>
        body {
            font-family: Segoe UI, Arial, sans-serif;
            max-width: 900px;
            margin: 32px auto;
            padding: 0 16px;
            background: linear-gradient(180deg, #f9fafb 0%, #eef2f7 100%);
        }
        h1 { margin-bottom: 8px; }
        p { color: #334155; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
            margin-top: 20px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #dbe1ea;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
        }
        .card h2 {
            margin: 0 0 8px;
            font-size: 18px;
        }
        .card p {
            margin: 0 0 12px;
            min-height: 48px;
        }
        .btn {
            display: inline-block;
            background: #0f766e;
            color: #fff;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn.secondary {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <h1>TTB Label Verifier</h1>
    <p>Select a UI:</p>

    <div class="grid">
        <section class="card">
            <h2>Upload Verification UI</h2>
            <p>Upload a label image and an application data text file to verify one label.</p>
            <a class="btn" href="/ui">Open Upload UI</a>
        </section>

        <section class="card">
            <h2>Test Runner UI</h2>
            <p>Run configured regression test cases against bundled fixtures and view results.</p>
            <a class="btn secondary" href="/tests/ui">Open Test Runner UI</a>
        </section>
    </div>
</body>
</html>
