<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Label Verifier Test Runner</title>
    <style>
        body { font-family: Segoe UI, Arial, sans-serif; max-width: 1000px; margin: 24px auto; padding: 0 16px; }
        button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
        .row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
        .summary { margin: 14px 0; font-weight: 600; }
        .description { margin: 6px 0 12px; color: #4b5563; }
        .progress-wrap { margin: 8px 0 12px; }
        .progress-label { margin-bottom: 6px; color: #374151; font-size: 13px; }
        .progress-track { width: 100%; height: 10px; border-radius: 999px; background: #e5e7eb; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0a7f3f, #34a853); transition: width 180ms ease; }
        .ok { color: #0a7f3f; }
        .bad { color: #b42318; }
        pre { background: #f6f8fa; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; vertical-align: top; text-align: left; }
        th { background: #f3f4f6; }
        .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .comparison > div { min-width: 0; }
        .comparison h4 { margin: 0 0 6px; font-size: 13px; }
    </style>
</head>
<body>
    <h1>Test Runner</h1>
    <p class="description">Run configured test cases to compare application data against OCR-extracted label text and validation checks.</p>
    <div class="row">
        <button id="runBtn">Run Test Cases</button>
    </div>
    <div class="progress-wrap">
        <div id="progressLabel" class="progress-label">Progress: 0/0</div>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
    </div>
    <div id="summary" class="summary"></div>
    <h3>Case Results</h3>
    <table>
        <thead>
            <tr><th>Case</th><th>Status</th><th>Comparison</th><th>Checks</th><th>Mismatches</th></tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>

    <script>
        const btn = document.getElementById('runBtn');
        const summary = document.getElementById('summary');
        const rows = document.getElementById('rows');
        const progressLabel = document.getElementById('progressLabel');
        const progressFill = document.getElementById('progressFill');
        let activeSource = null;

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderCaseRow(c) {
            const tr = document.createElement('tr');
            const mismatches = c.mismatches.length ? c.mismatches.join('\n') : '-';

            const applicationLines = [
                c.application_data_text || [
                    `Input brand: ${c.input?.brand_name ?? '-'}`,
                    `Input ABV: ${c.input?.abv ?? '-'}`,
                ].join('\n')
            ];

            const extractedData = c.extracted_text || '(empty)';
            const checkLines = [];
            for (const check of (c.checks || [])) {
                const scoreText = check.score == null ? '-' : check.score;
                checkLines.push(`${check.field}: ${check.status} (${scoreText})`);
            }

            const comparisonHtml = `
                <div class="comparison">
                    <div>
                        <h4>Application Data</h4>
                        <pre style="margin:0;">${escapeHtml(applicationLines.join('\n'))}</pre>
                    </div>
                    <div>
                        <h4>Extracted Data</h4>
                        <pre style="margin:0;">${escapeHtml(extractedData)}</pre>
                    </div>
                </div>
            `;

            tr.innerHTML = `
                <td>${escapeHtml(c.name)}</td>
                <td class="${c.passed ? 'ok' : 'bad'}">${c.passed ? 'PASS' : 'FAIL'}</td>
                <td>${comparisonHtml}</td>
                <td><pre style="margin:0;">${escapeHtml(checkLines.join('\n') || '-')}</pre></td>
                <td><pre style="margin:0;">${escapeHtml(mismatches)}</pre></td>
            `;
            rows.appendChild(tr);
        }

        function stopStream() {
            if (activeSource) {
                activeSource.close();
                activeSource = null;
            }
            btn.disabled = false;
            btn.textContent = 'Run Test Cases';
        }

        function updateProgress(completed, total) {
            const safeTotal = Math.max(0, Number(total) || 0);
            const safeCompleted = Math.max(0, Math.min(Number(completed) || 0, safeTotal || Number(completed) || 0));
            const pct = safeTotal > 0 ? Math.round((safeCompleted / safeTotal) * 100) : 0;
            progressLabel.textContent = `Progress: ${safeCompleted}/${safeTotal || '?'}`;
            progressFill.style.width = `${pct}%`;
        }

        function runTests() {
            stopStream();
            btn.disabled = true;
            btn.textContent = 'Running...';
            summary.textContent = 'Starting test run...';
            rows.innerHTML = '';
            updateProgress(0, 0);

            const source = new EventSource('/tests/ui/run/stream');
            activeSource = source;

            source.addEventListener('case', (event) => {
                const payload = JSON.parse(event.data || '{}');
                if (payload.case) {
                    renderCaseRow(payload.case);
                }

                const completed = (payload.passed || 0) + (payload.failed || 0);
                updateProgress(completed, payload.total || 0);
                summary.innerHTML = `Running ${completed}/${payload.total || '?'} | Passed: <span class="ok">${payload.passed || 0}</span> | Failed: <span class="bad">${payload.failed || 0}</span>`;
            });

            source.addEventListener('done', (event) => {
                const payload = JSON.parse(event.data || '{}');
                updateProgress(payload.total || 0, payload.total || 0);
                summary.innerHTML = `Passed: <span class="ok">${payload.passed || 0}</span> | Failed: <span class="bad">${payload.failed || 0}</span>`;
                stopStream();
            });

            source.addEventListener('run_error', (event) => {
                const payload = JSON.parse(event.data || '{}');
                const completed = (payload.passed || 0) + (payload.failed || 0);
                updateProgress(completed, payload.total || 0);
                summary.innerHTML = `<span class="bad">Failed: ${escapeHtml(payload.error || 'Test runner failed.')}</span>`;
                stopStream();
            });

            source.onerror = () => {
                if (activeSource) {
                    summary.innerHTML = '<span class="bad">Stream connection lost.</span>';
                    stopStream();
                }
            };
        }

        btn.addEventListener('click', runTests);
    </script>
</body>
</html>
